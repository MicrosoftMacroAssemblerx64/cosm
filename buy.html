<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - COSMOS MARKET</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .content {
            padding: 30px;
            border: 2px solid #2ecc71;
            max-width: 500px;
            width: 90%;
        }

        h2 {
            color: #2ecc71;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #cccccc;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Spaces the buttons out */
            align-items: center;
        }

        .action-btn {
            background-color: #2ecc71;
            color: #000000;
            padding: 12px 0;
            width: 250px; /* Uniform width for both buttons */
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background-color: #27ae60;
        }

        .back-link {
            display: inline-block;
            margin-top: 35px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="content">
        <h2>Website currently under maintenance</h2>
        <p>To purchase, visit here:</p>
        
        <div class="btn-container">
            <a href="https://discord.gg/cosmosmarket" target="_blank" class="action-btn">Discord</a>
            <a href="https://t.me/cosmosmarkets" target="_blank" class="action-btn">Telegram</a>
        </div>

        <a href="index.html" class="back-link">← Back to home</a>
    </div>

</body>
</html>
