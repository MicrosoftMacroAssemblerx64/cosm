<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COSMOS MARKET</title>
    <style>
        body {
            background-color: #000000; /* Pure black background */
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .logo {
            width: 250px;
            height: auto;
            margin-bottom: 20px;
            /* Removed all filters and transforms to ensure image displays correctly */
        }

        h1 {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 40px;
            color: #2ecc71; /* Flat Green */
            text-transform: uppercase;
        }

        .buy-btn {
            background-color: #2ecc71;
            color: #000000;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }

        .buy-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <!-- Logo Section -->
    <img src="logo.png" alt="Cosmos Market Logo" class="logo">
    
    <!-- Title Section -->
    <h1>COSMOS MARKET</h1>

    <!-- Button Section -->
    <a href="buy.html" class="buy-btn">CLICK HERE TO BUY</a>

</body>
</html>
